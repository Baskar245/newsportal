<!DOCTYPE html>
<html>
<head>
    <title>My News Channel</title>
</head>
<body>

<h1>Latest News</h1>

{% for article in articles %}

    <h2>{{ article.title }}</h2>

    {% if article.image %}
        <img src="{{ article.image.url }}" width="300">
    {% endif %}

    <p>{{ article.content }}</p>

    <hr>

{% endfor %}

</body>
</html>
